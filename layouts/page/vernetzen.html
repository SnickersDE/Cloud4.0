{{ define "main" }}
<div class="hot-hero">
  <div class="hot-left">
    <div class="hot-label">Cloud4.0</div>
    <div class="hot-title">VER<br><em>NETZEN</em></div>
    <div class="hot-sub">Freundesliste und Gruppen aus Supabase.</div>
  </div>
  <div class="hot-right" id="networkHighlights"></div>
</div>
<div class="support-wrap" id="networkDetail" style="display:none;margin-top:20px;">
  <div style="width:100%;">
    <div class="wb-title" id="networkDetailTitle">Vernetzen</div>
    <p class="author-text" id="networkDetailMeta"></p>
    <div class="nl-form" style="display:block;margin-top:10px;">
      <input class="nl-input" id="newGroupName" type="text" placeholder="Neue Gruppe" style="width:100%;border-right:1px solid #333;margin-bottom:8px;"/>
      <textarea class="nl-input" id="newGroupDescription" placeholder="Gruppenbeschreibung" style="width:100%;height:100px;border-right:1px solid #333;margin-bottom:8px;"></textarea>
      <button class="nl-btn" id="createGroupBtn" type="button">Gruppe anlegen</button>
    </div>
  </div>
  <div class="support-qr" id="networkStatsBox">NET</div>
</div>
<div class="container"><div class="section-label">Freunde</div></div>
<div class="main-grid" id="friendsGrid"></div>
<div class="container"><div class="section-label">Gruppen</div></div>
<div class="main-grid" id="groupsGrid"></div>
{{ end }}
