{{ define "main" }}
<div class="wir-hero">
  <div class="page-title-inline">REGISTER</div>
  <div class="wir-sub">Erstelle ein neues Cloud4.0 Konto.</div>
</div>
<div class="support-wrap">
  <div>
    <div class="wb-title">Registrieren</div>
    <div class="nl-form" style="display:block;max-width:520px;">
      <input class="nl-input" id="registerEmail" type="email" placeholder="E-Mail" style="width:100%;border-right:1px solid #333;margin-bottom:8px;"/>
      <input class="nl-input" id="registerPassword" type="password" placeholder="Passwort" style="width:100%;border-right:1px solid #333;margin-bottom:8px;"/>
      <button class="nl-btn" id="registerSubmit" type="button">Konto erstellen</button>
    </div>
    <p class="author-text" id="registerStatus"></p>
    <pre id="authDebugLog" style="margin-top:10px;padding:10px;border:1px solid #333;background:#121212;color:#bdbdbd;max-width:520px;white-space:pre-wrap;font-size:12px;line-height:1.4;min-height:90px;">Diagnose-Log wird geladen…</pre>
  </div>
  <div class="support-qr">AUTH</div>
</div>
{{ end }}
