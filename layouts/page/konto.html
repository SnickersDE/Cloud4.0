{{ define "main" }}
<div class="hot-hero">
  <div class="hot-left">
    <div class="hot-label">Cloud4.0</div>
    <div class="hot-title">MEIN<br><em>KONTO</em></div>
    <div class="hot-sub">Profil, Favoriten und persönliche Leistungsdaten.</div>
  </div>
  <div class="hot-right" id="accountHighlights"></div>
</div>
<div class="container"><div class="section-label">Profil</div></div>
<div class="support-wrap" id="accountProfileBox">
  <div>
    <div class="wb-title" id="accountName">Lade Profil…</div>
    <p class="author-text" id="accountMail"></p>
    <p class="author-text" id="accountMeta"></p>
    <div class="nl-form" style="display:block;max-width:560px;margin-top:10px;">
      <textarea class="nl-input" id="profileAboutMe" placeholder="Über mich" style="width:100%;height:110px;border-right:1px solid #333;margin-bottom:8px;"></textarea>
      <input class="nl-input" id="profileStudyProgram" type="text" placeholder="Studiengang" style="width:100%;border-right:1px solid #333;margin-bottom:8px;"/>
      <input class="nl-input" id="profileFriendCode" type="text" placeholder="Freundschaftscode" style="width:100%;border-right:1px solid #333;margin-bottom:8px;" readonly/>
      <button class="nl-btn" id="saveProfileBtn" type="button">Profil speichern</button>
    </div>
    <p class="author-text" id="profileStatus"></p>
    <button class="soc-btn" id="accountLogoutBtn" type="button">Ausloggen</button>
    <p class="author-text" id="accountLogoutStatus"></p>
  </div>
  <div class="support-qr" id="accountAvatar">Profil</div>
</div>
<div class="container"><div class="section-label">Veröffentlichte Mitschriften</div></div>
<div class="main-grid" id="accountNotesGrid"></div>
{{ end }}
