{{ define "main" }}

<div class="tabelle-banner">
  <div class="tabelle-banner-left">
    <div class="tabelle-banner-eyebrow">Echtzeit · OpenLigaDB API</div>
    <div class="tabelle-banner-title">LIVE<br><span>TABELLE</span></div>
    <div class="tabelle-banner-sub">Automatisch aktualisiert · 1. &amp; 2. Bundesliga · Saison 2025/26</div>
  </div>
  <div class="tabelle-refresh-info">
    <div class="refresh-badge"><div class="refresh-dot"></div> Live Daten</div>
    <div id="lastUpdate">Lade Daten…</div>
  </div>
</div>

<!-- Liga Tabs -->
<div class="liga-tabs">
  <button class="liga-tab active" id="tab-bl1" onclick="switchLiga('bl1')">1. Bundesliga</button>
  <button class="liga-tab" id="tab-bl2" onclick="switchLiga('bl2')">2. Bundesliga</button>
</div>

<!-- Matchday Results -->
<div class="matchday-wrap">
  <div class="matchday-header">
    <div class="matchday-label">Aktueller Spieltag</div>
    <div class="matchday-title" id="matchdayTitle">Lade…</div>
  </div>
  <div class="matches-grid" id="matchesGrid">
    <div class="skel-match shimmer"></div>
    <div class="skel-match shimmer"></div>
    <div class="skel-match shimmer"></div>
    <div class="skel-match shimmer"></div>
    <div class="skel-match shimmer"></div>
    <div class="skel-match shimmer"></div>
  </div>
</div>

<!-- Standings Table -->
<div class="standings-wrap">
  <table class="standings-table" id="standingsTable">
    <thead>
      <tr>
        <th class="num" style="width:52px;">#</th>
        <th>Verein</th>
        <th class="num">Sp</th>
        <th class="num">G</th>
        <th class="num">U</th>
        <th class="num">N</th>
        <th class="num">Tore</th>
        <th class="num">+/-</th>
        <th class="num">Pkt</th>
        <th>Form</th>
      </tr>
    </thead>
    <tbody id="standingsBody">
      <tr><td colspan="10"><div class="skel-row shimmer"></div></td></tr>
      <tr><td colspan="10"><div class="skel-row shimmer"></div></td></tr>
      <tr><td colspan="10"><div class="skel-row shimmer"></div></td></tr>
      <tr><td colspan="10"><div class="skel-row shimmer"></div></td></tr>
      <tr><td colspan="10"><div class="skel-row shimmer"></div></td></tr>
    </tbody>
  </table>
  <div class="standings-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#0057b8;"></div>Champions League</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e67e00;"></div>Europa League</div>
    <div class="legend-item"><div class="legend-dot" style="background:#009944;"></div>Conference League</div>
    <div class="legend-item"><div class="legend-dot" style="background:#D0021B;"></div>Relegation / Abstieg</div>
  </div>
</div>

<script src="{{ "js/tabelle.js" | relURL }}"></script>

{{ end }}
