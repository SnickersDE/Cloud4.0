{{ define "main" }}
<div class="wir-hero">
  <div class="page-title-inline">LOGIN</div>
  <div class="wir-sub">Melde dich mit deinem Cloud4.0 Konto an.</div>
</div>
<div class="support-wrap">
  <div>
    <div class="wb-title">Anmelden</div>
    <div class="nl-form" style="display:block;max-width:520px;">
      <input class="nl-input" id="loginEmail" type="email" placeholder="E-Mail" style="width:100%;border-right:1px solid #333;margin-bottom:8px;"/>
      <input class="nl-input" id="loginPassword" type="password" placeholder="Passwort" style="width:100%;border-right:1px solid #333;margin-bottom:8px;"/>
      <button class="nl-btn" id="loginSubmit" type="button">Einloggen</button>
    </div>
    <p class="author-text" id="loginStatus"></p>
  </div>
  <div class="support-qr">AUTH</div>
</div>
{{ end }}
