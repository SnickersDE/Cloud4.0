<header>
  <div class="header-top">
    <div class="logo-row">
      <a class="logo" href="{{ .Site.Home.RelPermalink }}" onclick="window.location.href='{{ .Site.Home.RelPermalink }}'; return false;">
        CLOUD<span class="accent">4.0</span>
      </a>
      <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Navigation öffnen">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="text" placeholder="Suche Mitschriften, Begriffe, Module..."/>
        <button class="search-btn" onclick="toggleSearch()">&#128269; Suche</button>
      </div>
      <div class="search-results" id="searchResults"></div>
      <div class="header-meta">
        <span id="headerDate"></span>
      </div>
    </div>
  </div>

  <nav id="mainNav">
    <div class="nav-inner">
      <div class="nav-left" id="navLeftLinks">

        <div class="nav-item">
          <a class="nav-btn{{ if .IsHome }} active{{ end }}" href="{{ .Site.Home.RelPermalink }}">
            Start
          </a>
        </div>
        <div class="nav-item">
          <a class="nav-btn{{ if eq .RelPermalink "/spiele/" }} active{{ end }}" href="{{ "spiele/" | relURL }}">
            Spiele
          </a>
        </div>
        <div class="nav-item">
          <a class="nav-btn{{ if eq .RelPermalink "/zusammenfassungen/" }} active{{ end }}" href="{{ "zusammenfassungen/" | relURL }}">
            Zusammenfassungen
          </a>
        </div>
        <div class="nav-item">
          <a class="nav-btn{{ if eq .RelPermalink "/karteikarten/" }} active{{ end }}" href="{{ "karteikarten/" | relURL }}">
            Karteikarten
          </a>
        </div>
        <div class="nav-item">
          <a class="nav-btn{{ if eq .RelPermalink "/quiz/" }} active{{ end }}" href="{{ "quiz/" | relURL }}">
            Quiz
          </a>
        </div>
        <div class="nav-item">
          <a class="nav-btn{{ if eq .RelPermalink "/ai-mode/" }} active{{ end }}" href="{{ "ai-mode/" | relURL }}">
            AI Mode
          </a>
        </div>
        <div class="nav-item">
          <a class="nav-btn{{ if eq .RelPermalink "/vernetzen/" }} active{{ end }}" href="{{ "vernetzen/" | relURL }}">
            Vernetzen
          </a>
        </div>
        <div class="nav-item">
          <a class="nav-btn{{ if eq .RelPermalink "/konto/" }} active{{ end }}" href="{{ "konto/" | relURL }}">
            Mein Konto
          </a>
        </div>
        <div class="nav-item auth-only-link" style="display:none;">
          <a class="nav-btn" id="navLogoutLink" href="#" onclick="return false;">
            Abmelden
          </a>
        </div>
        <div class="nav-item guest-only-link">
          <a class="nav-btn{{ if eq .RelPermalink "/login/" }} active{{ end }}" id="navLoginLink" href="{{ "login/" | relURL }}">
            Anmelden
          </a>
        </div>
        <div class="nav-item guest-only-link">
          <a class="nav-btn{{ if eq .RelPermalink "/register/" }} active{{ end }}" id="navRegisterLink" href="{{ "register/" | relURL }}">
            Registrieren
          </a>
        </div>

      </div>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="{{ .Site.Home.RelPermalink }}">Start</a>
    <a href="{{ "spiele/" | relURL }}">Spiele</a>
    <a href="{{ "zusammenfassungen/" | relURL }}">Zusammenfassungen</a>
    <a href="{{ "karteikarten/" | relURL }}">Karteikarten</a>
    <a href="{{ "quiz/" | relURL }}">Quiz</a>
    <a href="{{ "ai-mode/" | relURL }}">AI Mode</a>
    <a href="{{ "vernetzen/" | relURL }}">Vernetzen</a>
    <a href="{{ "konto/" | relURL }}">Mein Konto</a>
    <a class="auth-only-link" id="mobileLogoutLink" href="#" onclick="return false;" style="display:none;">Abmelden</a>
    <a class="guest-only-link" id="mobileLoginLink" href="{{ "login/" | relURL }}">Anmelden</a>
    <a class="guest-only-link" id="mobileRegisterLink" href="{{ "register/" | relURL }}">Registrieren</a>
  </div>
</header>
