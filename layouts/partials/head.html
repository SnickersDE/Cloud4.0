  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ if .IsHome }}{{ .Site.Title }} — Lernplattform{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,900&family=Barlow:wght@400;500;600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet"/>
  {{ $supabaseUrl := .Site.Params.supabaseUrl }}
  {{ if eq $supabaseUrl "" }}{{ $supabaseUrl = getenv "HUGO_SUPABASE_URL" }}{{ end }}
  {{ $supabaseAnonKey := .Site.Params.supabaseAnonKey }}
  {{ if eq $supabaseAnonKey "" }}{{ $supabaseAnonKey = getenv "HUGO_SUPABASE_ANON_KEY" }}{{ end }}
  <script>
    window.__SUPABASE_URL__ = '{{ $supabaseUrl }}';
    window.__SUPABASE_ANON_KEY__ = '{{ $supabaseAnonKey }}';
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}"/>
